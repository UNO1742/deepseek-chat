<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>DeepSeek Chat</title>
  <style>
    :root {
      --bg: #0a0d12;
      --panel: rgba(17, 22, 30, .92);
      --panel-2: #161c26;
      --panel-3: #1d2532;
      --text: #eef3fb;
      --muted: #8f9bad;
      --border: rgba(255, 255, 255, .09);
      --accent: #4e8cff;
      --accent-2: #7c5cff;
      --danger: #ff667a;
      --success: #53d69d;
      --shadow: 0 24px 70px rgba(0, 0, 0, .35);
      --sidebar: 284px;
      --settings: 340px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.6 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -40%;
      pointer-events: none;
      background:
        radial-gradient(circle at 30% 30%, rgba(78, 140, 255, .12), transparent 24%),
        radial-gradient(circle at 70% 65%, rgba(124, 92, 255, .10), transparent 22%);
      filter: blur(30px);
    }

    button, input, textarea, select { font: inherit; }
    button { color: inherit; }

    .app {
      position: relative;
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: rgba(12, 16, 22, .88);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(18px);
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 20px 18px 14px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .logo {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 8px 24px rgba(78, 140, 255, .28);
      font-weight: 900;
    }

    .brand-icon-image {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      object-fit: cover;
    }

    .icon-customizer {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .icon-preview {
      display: grid;
      place-items: center;
      width: 64px;
      height: 64px;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid rgba(78, 140, 255, .25);
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 28px rgba(78, 140, 255, .18);
      font-size: 23px;
      font-weight: 850;
    }

    .icon-customizer-actions {
      display: grid;
      flex: 1;
      gap: 7px;
    }

    .new-chat {
      margin: 6px 14px 14px;
      padding: 10px 14px;
      border: 1px solid rgba(78, 140, 255, .28);
      border-radius: 11px;
      background: rgba(78, 140, 255, .10);
      cursor: pointer;
      transition: .2s ease;
    }

    .new-chat:hover {
      background: rgba(78, 140, 255, .17);
      transform: translateY(-1px);
    }

    .search-wrap { padding: 0 14px 10px; }

    .search {
      width: 100%;
      padding: 9px 11px;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 9px;
      outline: none;
      background: rgba(255, 255, 255, .035);
    }

    .search:focus { border-color: rgba(78, 140, 255, .5); }

    .history {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 4px 9px 16px;
    }

    .history-label {
      padding: 8px 10px 5px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 2px 0;
      padding: 8px 7px 8px 11px;
      border-radius: 9px;
      color: #bdc7d6;
      cursor: pointer;
    }

    .history-item:hover, .history-item.active {
      color: var(--text);
      background: rgba(255, 255, 255, .055);
    }

    .history-title {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .history-delete {
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      padding: 0;
      opacity: 0;
      border: 0;
      border-radius: 7px;
      background: transparent;
      cursor: pointer;
    }

    .history-item:hover .history-delete { opacity: .7; }
    .history-delete:hover { opacity: 1 !important; background: rgba(255, 102, 122, .12); }

    .sidebar-footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    .ghost-btn, .icon-btn {
      border: 1px solid var(--border);
      border-radius: 9px;
      background: rgba(255, 255, 255, .035);
      cursor: pointer;
    }

    .ghost-btn { padding: 8px; color: var(--muted); }
    .ghost-btn:hover, .icon-btn:hover { color: var(--text); background: rgba(255, 255, 255, .075); }

    .main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-width: 0;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 64px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 13, 18, .68);
      backdrop-filter: blur(16px);
      z-index: 10;
    }

    .menu-btn { display: none; }

    .model-select {
      max-width: 220px;
      padding: 8px 34px 8px 11px;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 9px;
      outline: none;
      background: var(--panel-2);
      cursor: pointer;
    }

    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, .03);
      cursor: pointer;
      user-select: none;
    }

    .mode-toggle.active {
      color: #dbe8ff;
      border-color: rgba(78, 140, 255, .35);
      background: rgba(78, 140, 255, .12);
    }

    .workspace-btn {
      max-width: 190px;
      padding: 7px 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      text-overflow: ellipsis;
      white-space: nowrap;
      background: rgba(255, 255, 255, .03);
      cursor: pointer;
    }

    .workspace-btn.connected {
      color: #c9f6e3;
      border-color: rgba(83, 214, 157, .28);
      background: rgba(83, 214, 157, .08);
    }

    .mode-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 12px currentColor;
    }

    .top-spacer { flex: 1; }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }

    .status.ready .status-dot { background: var(--success); }
    .status.busy .status-dot { background: #ffc857; animation: pulse 1.2s infinite; }
    .status.error .status-dot { background: var(--danger); }

    @keyframes pulse { 50% { opacity: .35; } }

    .icon-btn {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      padding: 0;
    }

    .messages {
      position: relative;
      height: 100%;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: scroll;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      scrollbar-color: rgba(150, 170, 205, .55) rgba(255, 255, 255, .035);
      scrollbar-width: thin;
      scroll-behavior: smooth;
      touch-action: pan-y;
    }

    .message-list {
      width: min(860px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 22px;
    }

    .welcome {
      display: grid;
      place-items: center;
      min-height: calc(100vh - 250px);
      padding: 30px 0;
      text-align: center;
    }

    .welcome-mark {
      display: grid;
      place-items: center;
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border: 1px solid rgba(78, 140, 255, .25);
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(78, 140, 255, .18), rgba(124, 92, 255, .08));
      box-shadow: 0 18px 55px rgba(42, 92, 190, .18);
      font-size: 26px;
      font-weight: 800;
      overflow: hidden;
    }

    .welcome h1 { margin: 0 0 8px; font-size: clamp(24px, 4vw, 36px); }
    .welcome p { max-width: 520px; margin: 0 auto; color: var(--muted); }

    .suggestions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      width: min(600px, 100%);
      margin-top: 26px;
    }

    .suggestion {
      padding: 13px 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: #c8d2e0;
      text-align: left;
      background: rgba(255, 255, 255, .03);
      cursor: pointer;
    }

    .suggestion:hover {
      border-color: rgba(78, 140, 255, .35);
      background: rgba(78, 140, 255, .07);
    }

    .message {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 13px;
      padding: 17px 4px;
      animation: appear .22s ease;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(5px); }
    }

    .avatar {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--panel-3);
      font-size: 12px;
      font-weight: 800;
    }

    .message.user .avatar { background: linear-gradient(135deg, #335fae, #654bb8); }
    .message.assistant .avatar { color: #dbe8ff; border: 1px solid rgba(78, 140, 255, .24); }

    .message-head {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 26px;
      margin-bottom: 3px;
      font-weight: 650;
    }

    .message-meta { color: var(--muted); font-size: 11px; font-weight: 400; }
    .message-body { min-width: 0; color: #e6ebf3; overflow-wrap: anywhere; }
    .message-body > :first-child { margin-top: 0; }
    .message-body > :last-child { margin-bottom: 0; }
    .message-body p { margin: .55em 0; }
    .message-body h1, .message-body h2, .message-body h3 { margin: 1em 0 .45em; line-height: 1.3; }
    .message-body h1 { font-size: 1.55em; }
    .message-body h2 { font-size: 1.3em; }
    .message-body h3 { font-size: 1.12em; }
    .message-body ul, .message-body ol { margin: .5em 0; padding-left: 1.6em; }
    .message-body blockquote {
      margin: .8em 0;
      padding: .1em 0 .1em 1em;
      color: #aeb9c8;
      border-left: 3px solid rgba(78, 140, 255, .55);
    }

    .message-body a { color: #81aaff; }
    .message-body code {
      padding: .15em .36em;
      border-radius: 5px;
      color: #d9e7ff;
      background: rgba(255, 255, 255, .075);
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: .9em;
    }

    .code-block {
      position: relative;
      margin: .9em 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: #0b0f15;
    }

    .code-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, .035);
      font-size: 11px;
    }

    .copy-code {
      padding: 2px 7px;
      border: 0;
      border-radius: 5px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
    }

    .copy-code:hover { color: var(--text); background: rgba(255, 255, 255, .07); }
    .code-block pre { margin: 0; padding: 14px; overflow: auto; }
    .code-block pre code { padding: 0; color: #dce6f5; background: transparent; }

    .reasoning {
      margin: 8px 0 12px;
      border: 1px solid rgba(124, 92, 255, .18);
      border-radius: 10px;
      background: rgba(124, 92, 255, .045);
    }

    .reasoning summary {
      padding: 8px 11px;
      color: #aab5c6;
      cursor: pointer;
      user-select: none;
    }

    .reasoning-text {
      max-height: 330px;
      padding: 0 12px 11px;
      overflow-y: auto;
      color: #9ba7b8;
      white-space: pre-wrap;
      font-size: 13px;
    }

    .message-actions {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity .15s;
    }

    .message:hover .message-actions { opacity: 1; }

    .action-btn {
      padding: 3px 7px;
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 12px;
    }

    .action-btn:hover { color: var(--text); background: rgba(255, 255, 255, .06); }

    .typing::after {
      content: "▋";
      margin-left: 2px;
      color: var(--accent);
      animation: blink .8s steps(2) infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .composer-area {
      padding: 10px 18px 18px;
      background: linear-gradient(transparent, rgba(10, 13, 18, .94) 28%);
    }

    .composer {
      width: min(880px, 100%);
      margin: 0 auto;
      padding: 10px 10px 8px 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(22, 28, 38, .94);
      box-shadow: var(--shadow);
      transition: border-color .2s, box-shadow .2s;
    }

    .composer:focus-within {
      border-color: rgba(78, 140, 255, .42);
      box-shadow: 0 20px 70px rgba(0, 0, 0, .4), 0 0 0 3px rgba(78, 140, 255, .06);
    }

    .composer.dragging {
      border-color: var(--accent);
      background: rgba(35, 48, 70, .97);
    }

    .attachment-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 7px;
    }

    .attachment-list:empty { display: none; }

    .attachment-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      max-width: 260px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 9px;
      color: #c7d2e2;
      background: rgba(255, 255, 255, .045);
      font-size: 12px;
    }

    .attachment-icon {
      display: grid;
      place-items: center;
      width: 25px;
      height: 25px;
      flex: 0 0 auto;
      border-radius: 7px;
      color: #dce8ff;
      background: rgba(78, 140, 255, .14);
      font-size: 10px;
      font-weight: 750;
    }

    .attachment-info {
      min-width: 0;
      line-height: 1.3;
    }

    .attachment-name {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .attachment-size { color: var(--muted); font-size: 10px; }

    .attachment-remove {
      width: 22px;
      height: 22px;
      padding: 0;
      flex: 0 0 auto;
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
    }

    .attachment-remove:hover { color: #ffc3cc; background: rgba(255, 102, 122, .10); }

    .message-attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 5px 0 9px;
    }

    .upload-btn {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      padding: 0;
      border: 0;
      border-radius: 9px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 18px;
    }

    .upload-btn:hover { color: var(--text); background: rgba(255, 255, 255, .06); }

    #prompt {
      display: block;
      width: 100%;
      max-height: 190px;
      min-height: 28px;
      padding: 2px 2px 6px;
      resize: none;
      overflow-y: auto;
      color: var(--text);
      border: 0;
      outline: 0;
      background: transparent;
      line-height: 1.6;
    }

    #prompt::placeholder { color: #707b8c; }

    .composer-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .composer-hint {
      flex: 1;
      color: #687486;
      font-size: 11px;
    }

    .send-btn {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      padding: 0;
      border: 0;
      border-radius: 11px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 7px 20px rgba(78, 140, 255, .25);
      cursor: pointer;
    }

    .send-btn:disabled { opacity: .38; cursor: not-allowed; box-shadow: none; }
    .send-btn.stop { background: var(--danger); }

    .disclaimer {
      margin-top: 7px;
      color: #667184;
      text-align: center;
      font-size: 11px;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(var(--settings), 92vw);
      padding: 18px;
      overflow-y: auto;
      border-left: 1px solid var(--border);
      background: rgba(15, 20, 28, .97);
      box-shadow: -20px 0 60px rgba(0, 0, 0, .35);
      backdrop-filter: blur(18px);
      transform: translateX(105%);
      transition: transform .24s ease;
      z-index: 50;
    }

    .drawer.open { transform: translateX(0); }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      visibility: hidden;
      opacity: 0;
      background: rgba(0, 0, 0, .48);
      transition: .2s;
      z-index: 40;
    }

    .drawer-overlay.open { visibility: visible; opacity: 1; }

    .approval-modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      visibility: hidden;
      padding: 18px;
      opacity: 0;
      background: rgba(0, 0, 0, .66);
      transition: .18s;
      z-index: 120;
    }

    .approval-modal.open { visibility: visible; opacity: 1; }

    .approval-card {
      width: min(760px, 100%);
      max-height: min(760px, 90vh);
      padding: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #111720;
      box-shadow: var(--shadow);
    }

    .approval-card h2 { margin: 0 0 5px; font-size: 18px; }
    .approval-path { margin-bottom: 12px; color: #8fb4ff; overflow-wrap: anywhere; }

    .approval-preview {
      width: 100%;
      height: min(440px, 52vh);
      padding: 12px;
      resize: none;
      color: #dce6f5;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      background: #090d12;
      font: 12px/1.55 "Cascadia Code", Consolas, monospace;
    }

    .approval-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 13px;
    }

    .approve-btn {
      padding: 8px 14px;
      border: 0;
      border-radius: 9px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
    }

    .drawer-head {
      display: flex;
      align-items: center;
      margin-bottom: 18px;
    }

    .drawer-head h2 { flex: 1; margin: 0; font-size: 18px; }

    .setting-group {
      margin: 0 0 18px;
      padding: 0 0 18px;
      border-bottom: 1px solid var(--border);
    }

    .setting-title { margin-bottom: 10px; color: #d8e0eb; font-weight: 650; }
    .field { display: block; margin-top: 11px; }
    .field-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 5px; color: var(--muted); font-size: 12px; }

    .input, .textarea, .select {
      width: 100%;
      padding: 9px 10px;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 9px;
      outline: none;
      background: var(--panel-2);
    }

    .textarea { min-height: 90px; resize: vertical; }
    .input:focus, .textarea:focus, .select:focus { border-color: rgba(78, 140, 255, .55); }
    input[type="range"] { width: 100%; accent-color: var(--accent); }

    .key-row { display: grid; grid-template-columns: 1fr auto; gap: 7px; }
    .tiny-btn { padding: 0 10px; }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
    }

    .warning {
      margin-top: 10px;
      padding: 9px 10px;
      border: 1px solid rgba(255, 200, 87, .18);
      border-radius: 8px;
      color: #cfba86;
      background: rgba(255, 200, 87, .055);
      font-size: 11px;
      line-height: 1.5;
    }

    .toast-stack {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: grid;
      gap: 8px;
      z-index: 100;
    }

    .toast {
      max-width: 350px;
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(24, 31, 42, .97);
      box-shadow: var(--shadow);
      animation: toast-in .2s ease;
    }

    .toast.error { border-color: rgba(255, 102, 122, .3); color: #ffc3cc; }
    @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } }

    .empty-history { padding: 28px 12px; color: #657083; text-align: center; font-size: 12px; }
    .mobile-overlay { display: none; }

    ::-webkit-scrollbar { width: 11px; height: 11px; }
    ::-webkit-scrollbar-thumb {
      min-height: 34px;
      border: 3px solid transparent;
      border-radius: 10px;
      background: rgba(150, 170, 205, .52);
      background-clip: padding-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(180, 198, 228, .76); background-clip: padding-box; }
    ::-webkit-scrollbar-track { background: rgba(255, 255, 255, .025); }

    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        width: min(var(--sidebar), 86vw);
        transform: translateX(-105%);
        transition: transform .22s ease;
      }
      .sidebar.open { transform: translateX(0); }
      .mobile-overlay {
        position: fixed;
        inset: 0;
        display: block;
        visibility: hidden;
        opacity: 0;
        background: rgba(0, 0, 0, .5);
        transition: .2s;
        z-index: 15;
      }
      .mobile-overlay.open { visibility: visible; opacity: 1; }
      .menu-btn { display: grid; }
      .status span:last-child { display: none; }
      .topbar { padding-inline: 10px; }
      .model-select { max-width: 155px; }
      .mode-toggle { padding: 7px 9px; }
      .mode-toggle .mode-label { display: none; }
      .workspace-btn { max-width: 110px; }
      .message-list { width: calc(100% - 22px); padding-top: 16px; }
      .composer-area { padding: 8px 10px 11px; }
      .suggestions { grid-template-columns: 1fr; }
      .welcome { min-height: calc(100vh - 230px); }
      .message-actions { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">D</div>
        <span>DeepSeek Chat</span>
      </div>
      <button class="new-chat" id="newChatBtn">＋ 新建对话</button>
      <div class="search-wrap">
        <input class="search" id="historySearch" type="search" placeholder="搜索历史对话">
      </div>
      <div class="history" id="history"></div>
      <div class="sidebar-footer">
        <button class="ghost-btn" id="importBtn">导入</button>
        <button class="ghost-btn" id="exportBtn">导出</button>
        <input id="importFile" type="file" accept="application/json" hidden>
      </div>
    </aside>

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn menu-btn" id="menuBtn" title="打开侧边栏">☰</button>
        <select class="model-select" id="modelSelect" aria-label="模型">
          <option value="deepseek-v4-flash">DeepSeek V4 Flash</option>
          <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
          <option value="custom">自定义模型…</option>
        </select>
        <button class="mode-toggle active" id="thinkingToggle" title="切换思考模式">
          <span class="mode-dot"></span>
          <span class="mode-label">深度思考</span>
        </button>
        <button class="mode-toggle" id="agentToggle" title="允许 AI 调用项目文件工具">
          <span class="mode-dot"></span>
          <span class="mode-label">Agent</span>
        </button>
        <button class="workspace-btn" id="workspaceBtn" title="选择 Agent 可访问的项目文件夹">
          选择项目
        </button>
        <div class="top-spacer"></div>
        <div class="status" id="status">
          <span class="status-dot"></span>
          <span id="statusText">未配置</span>
        </div>
        <button class="icon-btn" id="settingsBtn" title="设置">⚙</button>
      </header>

      <section class="messages" id="messages">
        <div class="message-list" id="messageList"></div>
      </section>

      <footer class="composer-area">
        <div class="composer" id="composer">
          <div class="attachment-list" id="pendingAttachments"></div>
          <textarea id="prompt" rows="1" placeholder="给 DeepSeek 发送消息…"></textarea>
          <div class="composer-bottom">
            <button class="upload-btn" id="uploadBtn" title="上传文件">＋</button>
            <input id="fileInput" type="file" multiple hidden
              accept=".txt,.md,.markdown,.json,.jsonl,.csv,.tsv,.xml,.yaml,.yml,.html,.htm,.css,.js,.mjs,.cjs,.ts,.tsx,.jsx,.py,.java,.c,.h,.cpp,.hpp,.cs,.go,.rs,.php,.rb,.sh,.sql,.log,.ini,.toml,.env,.pdf,text/*,application/json,application/pdf">
            <span class="composer-hint">Enter 发送 · Shift + Enter 换行</span>
            <button class="send-btn" id="sendBtn" title="发送" disabled>↑</button>
          </div>
        </div>
        <div class="disclaimer">AI 可能会犯错，请核实重要信息。API Key 默认仅保存在当前浏览器会话。</div>
      </footer>
    </main>
  </div>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="settingsDrawer">
    <div class="drawer-head">
      <h2>设置</h2>
      <button class="icon-btn" id="closeSettingsBtn">×</button>
    </div>

    <section class="setting-group">
      <div class="setting-title">品牌图标</div>
      <div class="icon-customizer">
        <div class="icon-preview" id="iconPreview">D</div>
        <div class="icon-customizer-actions">
          <button class="ghost-btn" id="chooseIconBtn" type="button">选择图片</button>
          <button class="ghost-btn" id="resetIconBtn" type="button">恢复默认</button>
          <input id="iconInput" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml" hidden>
        </div>
      </div>
      <div class="field-row" style="margin-top:9px">
        <span>支持 PNG、JPG、WebP、SVG，建议使用正方形图片</span>
      </div>
    </section>

    <section class="setting-group">
      <div class="setting-title">API 连接</div>
      <label class="field">
        <div class="field-row"><span>API Key</span><span id="keyState">未设置</span></div>
        <div class="key-row">
          <input class="input" id="apiKey" type="password" autocomplete="off" placeholder="sk-...">
          <button class="ghost-btn tiny-btn" id="showKeyBtn">显示</button>
        </div>
      </label>
      <label class="check-row">
        <input id="rememberKey" type="checkbox">
        <span>在此设备持久保存 Key</span>
      </label>
      <label class="field">
        <div class="field-row"><span>API 地址</span></div>
        <input class="input" id="baseUrl" value="https://api.deepseek.com" placeholder="https://api.deepseek.com">
      </label>
      <div class="warning">
        纯 HTML 直连会让 API Key 出现在浏览器中，仅适合个人本地使用。公开部署时请将 API 地址改为你自己的后端代理。
      </div>
    </section>

    <section class="setting-group">
      <div class="setting-title">模型参数</div>
      <label class="field">
        <div class="field-row"><span>自定义模型名</span></div>
        <input class="input" id="customModel" placeholder="填写 API 支持的模型 ID">
      </label>
      <label class="field">
        <div class="field-row"><span>推理强度</span></div>
        <select class="select" id="reasoningEffort">
          <option value="high">High</option>
          <option value="max">Max</option>
        </select>
      </label>
      <label class="field">
        <div class="field-row"><span>温度</span><span id="temperatureValue">1.0</span></div>
        <input id="temperature" type="range" min="0" max="2" step="0.1" value="1">
      </label>
      <label class="field">
        <div class="field-row"><span>最大输出 Token</span></div>
        <input class="input" id="maxTokens" type="number" min="1" max="65536" value="8192">
      </label>
      <label class="field">
        <div class="field-row"><span>响应格式</span></div>
        <select class="select" id="responseFormat">
          <option value="text">文本</option>
          <option value="json_object">JSON Object</option>
        </select>
      </label>
    </section>

    <section class="setting-group">
      <div class="setting-title">系统提示词</div>
      <textarea class="textarea" id="systemPrompt" placeholder="你是一个有帮助的 AI 助手。">你是一个有帮助、准确且友善的 AI 助手。请使用用户的语言回答。</textarea>
    </section>

    <section class="setting-group">
      <div class="setting-title">数据</div>
      <button class="ghost-btn" id="clearAllBtn" style="width:100%; color:#ff9aaa">清空全部本地对话</button>
    </section>
  </aside>

  <div class="toast-stack" id="toastStack"></div>

  <div class="approval-modal" id="approvalModal">
    <div class="approval-card">
      <h2>Agent 请求写入文件</h2>
      <div class="approval-path" id="approvalPath"></div>
      <textarea class="approval-preview" id="approvalPreview" readonly></textarea>
      <div class="approval-actions">
        <button class="ghost-btn" id="rejectWriteBtn" type="button">拒绝</button>
        <button class="approve-btn" id="approveWriteBtn" type="button">允许写入</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "deepseek_chat_state_v2";
      const SETTINGS_KEY = "deepseek_chat_settings_v2";
      const API_KEY_SESSION = "deepseek_api_key_session";
      const API_KEY_LOCAL = "deepseek_api_key_local";

      const $ = (selector) => document.querySelector(selector);
      const els = {
        sidebar: $("#sidebar"),
        mobileOverlay: $("#mobileOverlay"),
        menuBtn: $("#menuBtn"),
        history: $("#history"),
        historySearch: $("#historySearch"),
        newChatBtn: $("#newChatBtn"),
        importBtn: $("#importBtn"),
        exportBtn: $("#exportBtn"),
        importFile: $("#importFile"),
        modelSelect: $("#modelSelect"),
        thinkingToggle: $("#thinkingToggle"),
        agentToggle: $("#agentToggle"),
        workspaceBtn: $("#workspaceBtn"),
        status: $("#status"),
        statusText: $("#statusText"),
        settingsBtn: $("#settingsBtn"),
        settingsDrawer: $("#settingsDrawer"),
        drawerOverlay: $("#drawerOverlay"),
        closeSettingsBtn: $("#closeSettingsBtn"),
        iconPreview: $("#iconPreview"),
        chooseIconBtn: $("#chooseIconBtn"),
        resetIconBtn: $("#resetIconBtn"),
        iconInput: $("#iconInput"),
        messages: $("#messages"),
        messageList: $("#messageList"),
        composer: $("#composer"),
        pendingAttachments: $("#pendingAttachments"),
        prompt: $("#prompt"),
        uploadBtn: $("#uploadBtn"),
        fileInput: $("#fileInput"),
        sendBtn: $("#sendBtn"),
        apiKey: $("#apiKey"),
        keyState: $("#keyState"),
        rememberKey: $("#rememberKey"),
        baseUrl: $("#baseUrl"),
        showKeyBtn: $("#showKeyBtn"),
        customModel: $("#customModel"),
        reasoningEffort: $("#reasoningEffort"),
        temperature: $("#temperature"),
        temperatureValue: $("#temperatureValue"),
        maxTokens: $("#maxTokens"),
        responseFormat: $("#responseFormat"),
        systemPrompt: $("#systemPrompt"),
        clearAllBtn: $("#clearAllBtn"),
        toastStack: $("#toastStack"),
        approvalModal: $("#approvalModal"),
        approvalPath: $("#approvalPath"),
        approvalPreview: $("#approvalPreview"),
        rejectWriteBtn: $("#rejectWriteBtn"),
        approveWriteBtn: $("#approveWriteBtn")
      };

      const defaultSettings = {
        model: "deepseek-v4-flash",
        customModel: "",
        thinking: true,
        reasoningEffort: "high",
        temperature: 1,
        maxTokens: 8192,
        responseFormat: "text",
        systemPrompt: "你是一个有帮助、准确且友善的 AI 助手。请使用用户的语言回答。",
        baseUrl: "https://api.deepseek.com",
        customIcon: "",
        agentMode: false
      };

      let settings = loadJSON(SETTINGS_KEY, defaultSettings);
      if (settings.model === "deepseek-chat" || settings.model === "deepseek-reasoner") {
        settings.model = "deepseek-v4-flash";
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
      }
      let state = loadJSON(STORAGE_KEY, { conversations: [], activeId: null });
      let controller = null;
      let generating = false;
      let pendingAttachments = [];
      let workspaceHandle = null;
      let writeApprovalResolver = null;

      function loadJSON(key, fallback) {
        try {
          const value = JSON.parse(localStorage.getItem(key));
          return value && typeof value === "object" ? { ...fallback, ...value } : structuredClone(fallback);
        } catch {
          return structuredClone(fallback);
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function saveSettings() {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
      }

      function uid() {
        return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function getActiveConversation() {
        return state.conversations.find((item) => item.id === state.activeId) || null;
      }

      function createConversation() {
        const conversation = {
          id: uid(),
          title: "新对话",
          createdAt: Date.now(),
          updatedAt: Date.now(),
          messages: []
        };
        state.conversations.unshift(conversation);
        state.activeId = conversation.id;
        saveState();
        renderAll();
        renderPendingAttachments();
        closeSidebar();
        els.prompt.focus();
        return conversation;
      }

      function deleteConversation(id) {
        if (generating && id === state.activeId) stopGeneration();
        state.conversations = state.conversations.filter((item) => item.id !== id);
        if (state.activeId === id) state.activeId = state.conversations[0]?.id || null;
        saveState();
        renderAll();
      }

      function setActiveConversation(id) {
        if (generating) {
          toast("请先停止当前生成", "error");
          return;
        }
        pendingAttachments = [];
        state.activeId = id;
        saveState();
        renderAll();
        renderPendingAttachments();
        closeSidebar();
      }

      function titleFromText(text) {
        return text.replace(/\s+/g, " ").trim().slice(0, 32) || "新对话";
      }

      function renderAll() {
        renderHistory();
        renderMessages();
        updateControls();
      }

      function renderHistory() {
        const query = els.historySearch.value.trim().toLowerCase();
        const items = [...state.conversations]
          .sort((a, b) => b.updatedAt - a.updatedAt)
          .filter((item) => item.title.toLowerCase().includes(query));

        els.history.innerHTML = "";
        if (!items.length) {
          els.history.innerHTML = `<div class="empty-history">${query ? "没有匹配的对话" : "还没有历史对话"}</div>`;
          return;
        }

        const label = document.createElement("div");
        label.className = "history-label";
        label.textContent = "最近对话";
        els.history.append(label);

        items.forEach((item) => {
          const row = document.createElement("div");
          row.className = `history-item${item.id === state.activeId ? " active" : ""}`;
          row.dataset.id = item.id;

          const title = document.createElement("span");
          title.className = "history-title";
          title.textContent = item.title;

          const remove = document.createElement("button");
          remove.className = "history-delete";
          remove.title = "删除";
          remove.textContent = "×";
          remove.addEventListener("click", (event) => {
            event.stopPropagation();
            deleteConversation(item.id);
          });

          row.append(title, remove);
          row.addEventListener("click", () => setActiveConversation(item.id));
          row.addEventListener("dblclick", () => renameConversation(item));
          els.history.append(row);
        });
      }

      function renameConversation(conversation) {
        const next = window.prompt("修改对话标题", conversation.title);
        if (next?.trim()) {
          conversation.title = next.trim().slice(0, 80);
          conversation.updatedAt = Date.now();
          saveState();
          renderHistory();
        }
      }

      function renderMessages() {
        const conversation = getActiveConversation();
        els.messageList.innerHTML = "";

        if (!conversation || conversation.messages.length === 0) {
          els.messageList.innerHTML = `
            <div class="welcome">
              <div>
                <div class="welcome-mark">D</div>
                <h1>今天想聊点什么？</h1>
                <p>支持 DeepSeek V4 模型、深度思考、流式输出与多轮上下文。</p>
                <div class="suggestions">
                  <button class="suggestion">帮我制定一个高效的学习计划</button>
                  <button class="suggestion">解释一个复杂概念，并给出例子</button>
                  <button class="suggestion">帮我检查并优化一段代码</button>
                  <button class="suggestion">把一个想法整理成执行方案</button>
                </div>
              </div>
            </div>`;
          els.messageList.querySelectorAll(".suggestion").forEach((button) => {
            button.addEventListener("click", () => {
              els.prompt.value = button.textContent;
              resizePrompt();
              updateControls();
              els.prompt.focus();
            });
          });
          applyBranding();
          return;
        }

        conversation.messages.forEach((message, index) => {
          els.messageList.append(createMessageElement(message, index));
        });
        applyBranding();
      }

      function createMessageElement(message, index) {
        const article = document.createElement("article");
        article.className = `message ${message.role}`;
        article.dataset.index = index;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = message.role === "user" ? "你" : "DS";

        const content = document.createElement("div");
        const head = document.createElement("div");
        head.className = "message-head";
        head.innerHTML = `<span>${message.role === "user" ? "你" : "DeepSeek"}</span>`;

        if (message.model) {
          const meta = document.createElement("span");
          meta.className = "message-meta";
          meta.textContent = message.model;
          head.append(meta);
        }

        if (message.reasoning) {
          const details = document.createElement("details");
          details.className = "reasoning";
          if (message.streaming) details.open = true;
          const summary = document.createElement("summary");
          summary.textContent = message.streaming && !message.content ? "正在思考…" : "查看思考过程";
          const reasoningText = document.createElement("div");
          reasoningText.className = "reasoning-text";
          reasoningText.textContent = message.reasoning;
          details.append(summary, reasoningText);
          content.append(head, details);
        } else {
          content.append(head);
        }

        if (message.attachments?.length) {
          const attachments = document.createElement("div");
          attachments.className = "message-attachments";
          message.attachments.forEach((attachment) => {
            attachments.append(createAttachmentChip(attachment, false));
          });
          content.append(attachments);
        }

        const body = document.createElement("div");
        body.className = `message-body${message.streaming ? " typing" : ""}`;
        body.innerHTML = message.content
          ? renderMarkdown(message.content)
          : (message.streaming ? "正在连接…" : (message.attachments?.length ? "请结合附件内容回答。" : ""));
        content.append(body);

        const actions = document.createElement("div");
        actions.className = "message-actions";
        actions.innerHTML = `
          <button class="action-btn" data-action="copy">复制</button>
          ${message.role === "user" ? '<button class="action-btn" data-action="edit">编辑并重发</button>' : '<button class="action-btn" data-action="regenerate">重新生成</button>'}
        `;
        actions.addEventListener("click", (event) => handleMessageAction(event, index));
        content.append(actions);
        article.append(avatar, content);
        return article;
      }

      function createAttachmentChip(attachment, removable) {
        const chip = document.createElement("div");
        chip.className = "attachment-chip";

        const icon = document.createElement("span");
        icon.className = "attachment-icon";
        icon.textContent = attachment.type === "application/pdf" ? "PDF" : "FILE";

        const info = document.createElement("span");
        info.className = "attachment-info";
        const name = document.createElement("div");
        name.className = "attachment-name";
        name.textContent = attachment.name;
        const size = document.createElement("div");
        size.className = "attachment-size";
        size.textContent = `${formatBytes(attachment.size)} · ${attachment.characters.toLocaleString()} 字符`;
        info.append(name, size);
        chip.append(icon, info);

        if (removable) {
          const remove = document.createElement("button");
          remove.className = "attachment-remove";
          remove.type = "button";
          remove.title = "移除附件";
          remove.textContent = "×";
          remove.addEventListener("click", () => {
            pendingAttachments = pendingAttachments.filter((item) => item.id !== attachment.id);
            renderPendingAttachments();
            updateControls();
          });
          chip.append(remove);
        }
        return chip;
      }

      function renderPendingAttachments() {
        els.pendingAttachments.innerHTML = "";
        pendingAttachments.forEach((attachment) => {
          els.pendingAttachments.append(createAttachmentChip(attachment, true));
        });
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
      }

      function renderMarkdown(source) {
        const codeBlocks = [];
        let text = source.replace(/```([^\n`]*)\n?([\s\S]*?)```/g, (_, language, code) => {
          const index = codeBlocks.length;
          codeBlocks.push({
            language: language.trim() || "text",
            code: code.replace(/\n$/, "")
          });
          return `\n@@CODEBLOCK_${index}@@\n`;
        });

        text = escapeHTML(text);
        text = text
          .replace(/^### (.+)$/gm, "<h3>$1</h3>")
          .replace(/^## (.+)$/gm, "<h2>$1</h2>")
          .replace(/^# (.+)$/gm, "<h1>$1</h1>")
          .replace(/^&gt; (.+)$/gm, "<blockquote>$1</blockquote>")
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/~~(.+?)~~/g, "<del>$1</del>")
          .replace(/`([^`\n]+)`/g, "<code>$1</code>")
          .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

        const lines = text.split("\n");
        const output = [];
        let listType = null;

        const closeList = () => {
          if (listType) {
            output.push(`</${listType}>`);
            listType = null;
          }
        };

        for (const line of lines) {
          const unordered = line.match(/^\s*[-*] (.+)$/);
          const ordered = line.match(/^\s*\d+\. (.+)$/);
          if (unordered || ordered) {
            const nextType = unordered ? "ul" : "ol";
            if (listType !== nextType) {
              closeList();
              listType = nextType;
              output.push(`<${listType}>`);
            }
            output.push(`<li>${(unordered || ordered)[1]}</li>`);
          } else {
            closeList();
            if (/^@@CODEBLOCK_\d+@@$/.test(line.trim()) || /^<(h[1-3]|blockquote)>/.test(line)) {
              output.push(line);
            } else if (line.trim()) {
              output.push(`<p>${line}</p>`);
            }
          }
        }
        closeList();

        let html = output.join("");
        codeBlocks.forEach((block, index) => {
          const replacement = `
            <div class="code-block">
              <div class="code-head">
                <span>${escapeHTML(block.language)}</span>
                <button class="copy-code" data-code="${index}">复制代码</button>
              </div>
              <pre><code>${escapeHTML(block.code)}</code></pre>
            </div>`;
          html = html.replace(`<p>@@CODEBLOCK_${index}@@</p>`, replacement);
          html = html.replace(`@@CODEBLOCK_${index}@@`, replacement);
        });
        return html;
      }

      function escapeHTML(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      async function handleMessageAction(event, index) {
        const action = event.target.closest("[data-action]")?.dataset.action;
        if (!action || generating) return;
        const conversation = getActiveConversation();
        const message = conversation?.messages[index];
        if (!message) return;

        if (action === "copy") {
          await navigator.clipboard.writeText(messageContentForApi(message));
          toast("已复制");
        } else if (action === "edit") {
          els.prompt.value = message.content;
          pendingAttachments = (message.attachments || []).map((attachment) => ({ ...attachment }));
          conversation.messages = conversation.messages.slice(0, index);
          saveState();
          renderMessages();
          renderPendingAttachments();
          resizePrompt();
          updateControls();
          els.prompt.focus();
        } else if (action === "regenerate") {
          const lastUserIndex = conversation.messages
            .slice(0, index)
            .map((item) => item.role)
            .lastIndexOf("user");
          if (lastUserIndex >= 0) {
            conversation.messages = conversation.messages.slice(0, lastUserIndex + 1);
            saveState();
            renderMessages();
            await requestCompletion();
          }
        }
      }

      function getApiKey() {
        return els.apiKey.value.trim()
          || sessionStorage.getItem(API_KEY_SESSION)
          || localStorage.getItem(API_KEY_LOCAL)
          || "";
      }

      function storeApiKey() {
        const key = els.apiKey.value.trim();
        if (els.rememberKey.checked) {
          if (key) localStorage.setItem(API_KEY_LOCAL, key);
          else localStorage.removeItem(API_KEY_LOCAL);
          sessionStorage.removeItem(API_KEY_SESSION);
        } else {
          if (key) sessionStorage.setItem(API_KEY_SESSION, key);
          else sessionStorage.removeItem(API_KEY_SESSION);
          localStorage.removeItem(API_KEY_LOCAL);
        }
        updateConnectionStatus();
      }

      function selectedModel() {
        return settings.model === "custom" ? settings.customModel.trim() : settings.model;
      }

      async function addFiles(fileList) {
        const files = [...fileList];
        if (!files.length) return;

        for (const file of files) {
          if (pendingAttachments.length >= 5) {
            toast("每次最多上传 5 个文件", "error");
            break;
          }
          if (file.type.startsWith("image/")) {
            toast(`${file.name}：当前 DeepSeek 文本模型不支持图片识别`, "error", 5000);
            continue;
          }
          if (file.size > 10 * 1024 * 1024) {
            toast(`${file.name} 超过 10 MB，未添加`, "error");
            continue;
          }

          try {
            const text = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf")
              ? await extractPdfText(file)
              : await extractTextFile(file);
            const trimmed = text.trim();
            if (!trimmed) throw new Error("没有提取到可读文字");

            const currentTotal = pendingAttachments.reduce((sum, item) => sum + item.characters, 0);
            const remaining = 300000 - currentTotal;
            if (remaining <= 0) {
              toast("附件内容已达到单次 30 万字符上限", "error");
              break;
            }

            const content = trimmed.slice(0, Math.min(120000, remaining));
            pendingAttachments.push({
              id: uid(),
              name: file.name,
              type: file.type || "text/plain",
              size: file.size,
              characters: content.length,
              content,
              truncated: content.length < trimmed.length
            });
            if (content.length < trimmed.length) {
              toast(`${file.name} 内容较长，已截取前 ${content.length.toLocaleString()} 字符`);
            }
          } catch (error) {
            toast(`${file.name}：${error.message}`, "error", 5000);
          }
        }

        renderPendingAttachments();
        updateControls();
        els.fileInput.value = "";
      }

      async function extractTextFile(file) {
        const allowedExtensions = [
          "txt", "md", "markdown", "json", "jsonl", "csv", "tsv", "xml", "yaml", "yml",
          "html", "htm", "css", "js", "mjs", "cjs", "ts", "tsx", "jsx", "py", "java",
          "c", "h", "cpp", "hpp", "cs", "go", "rs", "php", "rb", "sh", "sql", "log",
          "ini", "toml", "env"
        ];
        const extension = file.name.split(".").pop()?.toLowerCase() || "";
        if (!file.type.startsWith("text/") && file.type !== "application/json" && !allowedExtensions.includes(extension)) {
          throw new Error("暂不支持此格式，请上传文本、代码、CSV、JSON、Markdown 或 PDF");
        }
        return file.text();
      }

      async function extractPdfText(file) {
        if (!window.pdfjsLib) {
          throw new Error("PDF 解析组件加载失败，请检查网络后重试");
        }
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        const pdf = await window.pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
        const pages = [];
        const pageCount = Math.min(pdf.numPages, 100);
        for (let pageNumber = 1; pageNumber <= pageCount; pageNumber += 1) {
          const page = await pdf.getPage(pageNumber);
          const content = await page.getTextContent();
          const text = content.items.map((item) => item.str).join(" ");
          pages.push(`--- 第 ${pageNumber} 页 ---\n${text}`);
          if (pages.join("\n\n").length >= 120000) break;
        }
        return pages.join("\n\n");
      }

      function messageContentForApi(message) {
        if (!message.attachments?.length) return message.content;
        const parts = [];
        if (message.content.trim()) parts.push(message.content.trim());
        parts.push("以下是用户上传的文件内容。请将文件名与内容对应，并基于这些内容回答：");
        message.attachments.forEach((attachment) => {
          parts.push(
            `\n<attachment name="${attachment.name.replaceAll('"', "&quot;")}">\n` +
            `${attachment.content}\n</attachment>`
          );
        });
        return parts.join("\n\n");
      }

      async function chooseWorkspace() {
        if (!window.showDirectoryPicker) {
          toast("当前浏览器不支持项目文件夹访问，请使用最新版 Edge 或 Chrome", "error", 6000);
          return false;
        }
        try {
          const handle = await window.showDirectoryPicker({ mode: "readwrite" });
          const permission = await handle.requestPermission({ mode: "readwrite" });
          if (permission !== "granted") throw new Error("未授予读写权限");
          workspaceHandle = handle;
          settings.agentMode = true;
          saveSettings();
          updateAgentUI();
          toast(`Agent 已连接项目：${handle.name}`);
          return true;
        } catch (error) {
          if (error.name !== "AbortError") toast(error.message, "error");
          return false;
        }
      }

      function updateAgentUI() {
        els.agentToggle.classList.toggle("active", settings.agentMode);
        els.workspaceBtn.classList.toggle("connected", Boolean(workspaceHandle));
        els.workspaceBtn.textContent = workspaceHandle ? workspaceHandle.name : "选择项目";
        els.workspaceBtn.title = workspaceHandle
          ? `已授权项目：${workspaceHandle.name}（点击可更换）`
          : "选择 Agent 可访问的项目文件夹";
      }

      function normalizeWorkspacePath(path = "") {
        const normalized = String(path).replaceAll("\\", "/").replace(/^\/+|\/+$/g, "");
        const parts = normalized.split("/").filter(Boolean);
        if (parts.some((part) => part === ".." || part === ".")) {
          throw new Error("路径不能包含 . 或 ..");
        }
        return parts;
      }

      async function getDirectoryHandle(path = "", create = false) {
        let handle = workspaceHandle;
        if (!handle) throw new Error("尚未选择项目文件夹");
        for (const part of normalizeWorkspacePath(path)) {
          handle = await handle.getDirectoryHandle(part, { create });
        }
        return handle;
      }

      async function getFileHandle(path, create = false) {
        const parts = normalizeWorkspacePath(path);
        const fileName = parts.pop();
        if (!fileName) throw new Error("必须提供文件路径");
        const directory = await getDirectoryHandle(parts.join("/"), create);
        return directory.getFileHandle(fileName, { create });
      }

      async function listWorkspaceFiles(path = "", depth = 2) {
        const root = await getDirectoryHandle(path);
        const lines = [];
        async function walk(directory, prefix, remainingDepth) {
          for await (const [name, handle] of directory.entries()) {
            if (lines.length >= 300) return;
            const relative = prefix ? `${prefix}/${name}` : name;
            lines.push(`${handle.kind === "directory" ? "DIR " : "FILE"} ${relative}`);
            if (handle.kind === "directory" && remainingDepth > 0 && !isIgnoredDirectory(name)) {
              await walk(handle, relative, remainingDepth - 1);
            }
          }
        }
        await walk(root, path.replace(/^\/+|\/+$/g, ""), Math.min(Math.max(Number(depth) || 1, 0), 4));
        return lines.join("\n") || "(空目录)";
      }

      function isIgnoredDirectory(name) {
        return [".git", "node_modules", ".npm-cache", ".netlify", ".venv", "dist", "build"].includes(name);
      }

      function isLikelyTextFile(name) {
        return /\.(txt|md|markdown|json|jsonl|csv|tsv|xml|ya?ml|html?|css|[cm]?js|jsx|tsx?|py|java|c|h|cpp|hpp|cs|go|rs|php|rb|sh|sql|log|ini|toml|env|vue|svelte)$/i.test(name);
      }

      async function readWorkspaceFile(path) {
        const handle = await getFileHandle(path);
        const file = await handle.getFile();
        if (file.size > 1024 * 1024) throw new Error("文件超过 1 MB，拒绝读取");
        const text = await file.text();
        return text.length > 160000
          ? `${text.slice(0, 160000)}\n\n[文件过长，已截断]`
          : text;
      }

      async function searchWorkspaceFiles(query, path = "") {
        if (!query) throw new Error("搜索词不能为空");
        const root = await getDirectoryHandle(path);
        const results = [];
        let scanned = 0;

        async function walk(directory, prefix) {
          for await (const [name, handle] of directory.entries()) {
            if (results.length >= 120 || scanned >= 350) return;
            const relative = prefix ? `${prefix}/${name}` : name;
            if (handle.kind === "directory") {
              if (!isIgnoredDirectory(name)) await walk(handle, relative);
              continue;
            }
            if (!isLikelyTextFile(name)) continue;
            scanned += 1;
            try {
              const file = await handle.getFile();
              if (file.size > 1024 * 1024) continue;
              const lines = (await file.text()).split(/\r?\n/);
              lines.forEach((line, index) => {
                if (results.length < 120 && line.toLowerCase().includes(String(query).toLowerCase())) {
                  results.push(`${relative}:${index + 1}: ${line.slice(0, 300)}`);
                }
              });
            } catch {}
          }
        }
        await walk(root, path.replace(/^\/+|\/+$/g, ""));
        return results.join("\n") || `未找到“${query}”`;
      }

      function requestWriteApproval(path, content) {
        return new Promise((resolve) => {
          writeApprovalResolver = resolve;
          els.approvalPath.textContent = path;
          els.approvalPreview.value = content;
          els.approvalModal.classList.add("open");
        });
      }

      function finishWriteApproval(approved) {
        els.approvalModal.classList.remove("open");
        writeApprovalResolver?.(approved);
        writeApprovalResolver = null;
      }

      async function writeWorkspaceFile(path, content) {
        const approved = await requestWriteApproval(path, String(content));
        if (!approved) return "用户拒绝了文件写入";
        const handle = await getFileHandle(path, true);
        const writable = await handle.createWritable();
        await writable.write(String(content));
        await writable.close();
        return `已写入 ${path}（${String(content).length} 字符）`;
      }

      const agentTools = [
        {
          type: "function",
          function: {
            name: "list_files",
            description: "列出已授权项目目录中的文件和子目录。先用它了解项目结构。",
            parameters: {
              type: "object",
              properties: {
                path: { type: "string", description: "相对项目根目录的目录路径，根目录使用空字符串" },
                depth: { type: "integer", description: "递归深度，0 到 4" }
              },
              required: ["path"]
            }
          }
        },
        {
          type: "function",
          function: {
            name: "read_file",
            description: "读取项目内一个文本或代码文件的完整内容。",
            parameters: {
              type: "object",
              properties: { path: { type: "string", description: "相对项目根目录的文件路径" } },
              required: ["path"]
            }
          }
        },
        {
          type: "function",
          function: {
            name: "search_files",
            description: "在项目的文本和代码文件中搜索文字，返回文件路径、行号和匹配行。",
            parameters: {
              type: "object",
              properties: {
                query: { type: "string", description: "要搜索的文字" },
                path: { type: "string", description: "可选的相对目录，默认项目根目录" }
              },
              required: ["query"]
            }
          }
        },
        {
          type: "function",
          function: {
            name: "write_file",
            description: "新建或完整覆盖一个项目文件。调用后必须等待用户审批。修改前应先读取原文件。",
            parameters: {
              type: "object",
              properties: {
                path: { type: "string", description: "相对项目根目录的文件路径" },
                content: { type: "string", description: "需要写入的完整文件内容，不是补丁" }
              },
              required: ["path", "content"]
            }
          }
        }
      ];

      async function executeAgentTool(toolCall) {
        let args;
        try {
          args = JSON.parse(toolCall.function.arguments || "{}");
        } catch {
          return "工具参数不是有效 JSON";
        }
        try {
          if (toolCall.function.name === "list_files") {
            return await listWorkspaceFiles(args.path || "", args.depth ?? 2);
          }
          if (toolCall.function.name === "read_file") return await readWorkspaceFile(args.path);
          if (toolCall.function.name === "search_files") {
            return await searchWorkspaceFiles(args.query, args.path || "");
          }
          if (toolCall.function.name === "write_file") {
            return await writeWorkspaceFile(args.path, args.content);
          }
          return `未知工具：${toolCall.function.name}`;
        } catch (error) {
          return `工具执行失败：${error.message}`;
        }
      }

      async function sendMessage() {
        const text = els.prompt.value.trim();
        if ((!text && !pendingAttachments.length) || generating) return;
        if (!getApiKey()) {
          openSettings();
          toast("请先填写 API Key", "error");
          els.apiKey.focus();
          return;
        }
        if (!selectedModel()) {
          openSettings();
          toast("请填写自定义模型名", "error");
          els.customModel.focus();
          return;
        }

        const conversation = getActiveConversation() || createConversation();
        const attachments = pendingAttachments.map((attachment) => ({ ...attachment }));
        conversation.messages.push({ role: "user", content: text, attachments });
        if (conversation.messages.filter((item) => item.role === "user").length === 1) {
          conversation.title = titleFromText(text || attachments.map((item) => item.name).join("、"));
        }
        conversation.updatedAt = Date.now();
        els.prompt.value = "";
        pendingAttachments = [];
        renderPendingAttachments();
        resizePrompt();
        saveState();
        renderAll();
        scrollToBottom();
        await requestCompletion();
      }

      async function requestCompletion() {
        const conversation = getActiveConversation();
        if (!conversation || generating) return;
        if (settings.agentMode) {
          await requestAgentCompletion(conversation);
          return;
        }

        const assistant = {
          role: "assistant",
          content: "",
          reasoning: "",
          model: selectedModel(),
          streaming: true
        };
        conversation.messages.push(assistant);
        conversation.updatedAt = Date.now();
        generating = true;
        controller = new AbortController();
        updateControls();
        setStatus("busy", "生成中");
        renderMessages();
        scrollToBottom();

        const messages = [];
        if (settings.systemPrompt.trim()) {
          messages.push({ role: "system", content: settings.systemPrompt.trim() });
        }
        conversation.messages.slice(0, -1).forEach((message) => {
          messages.push({ role: message.role, content: messageContentForApi(message) });
        });

        const payload = {
          model: selectedModel(),
          messages,
          stream: true,
          stream_options: { include_usage: true },
          temperature: Number(settings.temperature),
          max_tokens: Number(settings.maxTokens),
          thinking: { type: settings.thinking ? "enabled" : "disabled" }
        };
        if (settings.thinking) payload.reasoning_effort = settings.reasoningEffort;
        if (settings.responseFormat === "json_object") {
          payload.response_format = { type: "json_object" };
        }

        try {
          const url = `${settings.baseUrl.replace(/\/+$/, "")}/chat/completions`;
          const response = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${getApiKey()}`
            },
            body: JSON.stringify(payload),
            signal: controller.signal
          });

          if (!response.ok) {
            const raw = await response.text();
            let detail = raw;
            try { detail = JSON.parse(raw)?.error?.message || raw; } catch {}
            throw new Error(`API ${response.status}: ${detail || response.statusText}`);
          }
          if (!response.body) throw new Error("浏览器未提供可读取的流式响应");

          await readSSE(response.body, (data) => {
            if (data === "[DONE]") return;
            let chunk;
            try { chunk = JSON.parse(data); } catch { return; }
            const delta = chunk.choices?.[0]?.delta;
            if (delta?.reasoning_content) assistant.reasoning += delta.reasoning_content;
            if (delta?.content) assistant.content += delta.content;
            if (chunk.usage) assistant.usage = chunk.usage;
            patchStreamingMessage(assistant);
          });

          if (!assistant.content && !assistant.reasoning) {
            throw new Error("接口返回了空响应");
          }
        } catch (error) {
          if (error.name === "AbortError") {
            if (!assistant.content && !assistant.reasoning) {
              conversation.messages.pop();
            } else {
              assistant.content += "\n\n[已停止生成]";
            }
          } else {
            conversation.messages.pop();
            toast(friendlyError(error), "error", 6500);
            setStatus("error", "请求失败");
          }
        } finally {
          assistant.streaming = false;
          conversation.updatedAt = Date.now();
          generating = false;
          controller = null;
          saveState();
          renderAll();
          updateConnectionStatus();
          scrollToBottom();
        }
      }

      async function requestAgentCompletion(conversation) {
        if (!workspaceHandle) {
          const selected = await chooseWorkspace();
          if (!selected) {
            settings.agentMode = false;
            saveSettings();
            updateAgentUI();
            return;
          }
        }

        const assistant = {
          role: "assistant",
          content: "",
          reasoning: "",
          model: `${selectedModel()} · Agent`,
          streaming: true
        };
        conversation.messages.push(assistant);
        conversation.updatedAt = Date.now();
        generating = true;
        controller = new AbortController();
        updateControls();
        setStatus("busy", "Agent 分析中");
        renderMessages();
        scrollToBottom();

        const apiMessages = [];
        const completedActions = [];
        const agentInstruction =
          "你现在是一个代码 Agent。你可以使用工具检查用户明确授权的项目目录，并根据请求修改代码。" +
          "开始时先了解目录结构；修改现有文件前必须先读取它；使用 write_file 时提供完整文件内容。" +
          "不要声称执行了未执行的操作。用户拒绝写入后应尊重决定并解释结果。";
        apiMessages.push({
          role: "system",
          content: `${settings.systemPrompt.trim()}\n\n${agentInstruction}`.trim()
        });
        conversation.messages.slice(0, -1).forEach((message) => {
          apiMessages.push({ role: message.role, content: messageContentForApi(message) });
        });

        try {
          for (let round = 0; round < 8; round += 1) {
            const payload = {
              model: selectedModel(),
              messages: apiMessages,
              tools: agentTools,
              tool_choice: "auto",
              stream: true,
              stream_options: { include_usage: true },
              temperature: Number(settings.temperature),
              max_tokens: Number(settings.maxTokens),
              thinking: { type: settings.thinking ? "enabled" : "disabled" }
            };
            if (settings.thinking) payload.reasoning_effort = settings.reasoningEffort;

            assistant.content = "";
            const responseMessage = await streamAgentRound(payload, assistant);
            apiMessages.push({
              role: "assistant",
              content: responseMessage.content ?? "",
              reasoning_content: responseMessage.reasoning_content ?? "",
              ...(responseMessage.tool_calls ? { tool_calls: responseMessage.tool_calls } : {})
            });

            const toolCalls = responseMessage.tool_calls || [];
            if (!toolCalls.length) {
              assistant.content = responseMessage.content || "Agent 已完成，但没有返回文字说明。";
              assistant.streaming = false;
              patchStreamingMessage(assistant);
              break;
            }

            for (const toolCall of toolCalls) {
              setStatus("busy", `Agent：${toolCall.function.name}`);
              assistant.content = `正在调用工具：${toolCall.function.name}…`;
              patchStreamingMessage(assistant);
              const result = await executeAgentTool(toolCall);
              completedActions.push(`${toolCall.function.name}: ${String(result).slice(0, 240)}`);
              assistant.content = `已完成工具：${toolCall.function.name}\n\n${String(result).slice(0, 800)}`;
              patchStreamingMessage(assistant);
              apiMessages.push({
                role: "tool",
                tool_call_id: toolCall.id,
                content: String(result)
              });
            }

            if (round === 7) {
              assistant.content = "Agent 已达到 8 轮工具调用上限，请检查当前修改后再继续。";
            }
          }
        } catch (error) {
          if (error.name === "AbortError") {
            assistant.content = assistant.content || "[已停止 Agent]";
          } else {
            const actionSummary = completedActions.length
              ? `\n\n已完成的操作：\n- ${completedActions.join("\n- ")}`
              : "";
            assistant.content =
              `Agent 后续请求失败，但已完成的操作不会撤销。${actionSummary}\n\n错误：${friendlyError(error)}`;
            toast(friendlyError(error), "error", 6500);
            setStatus("error", "Agent 失败");
          }
        } finally {
          assistant.streaming = false;
          conversation.updatedAt = Date.now();
          generating = false;
          controller = null;
          saveState();
          renderAll();
          updateConnectionStatus();
          scrollToBottom();
        }
      }

      async function streamAgentRound(payload, assistant) {
        const url = `${settings.baseUrl.replace(/\/+$/, "")}/chat/completions`;
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${getApiKey()}`
          },
          body: JSON.stringify(payload),
          signal: controller.signal
        });
        if (!response.ok) {
          const raw = await response.text();
          let detail = raw;
          try { detail = JSON.parse(raw)?.error?.message || raw; } catch {}
          throw new Error(`API ${response.status}: ${detail || response.statusText}`);
        }
        if (!response.body) throw new Error("浏览器未提供可读取的 Agent 流式响应");

        const streamedMessage = {
          content: "",
          reasoning_content: "",
          tool_calls: []
        };

        await readSSE(response.body, (data) => {
          if (data === "[DONE]") return;
          let chunk;
          try { chunk = JSON.parse(data); } catch { return; }
          const choice = chunk.choices?.[0];
          const delta = choice?.delta;
          if (!delta) {
            if (chunk.usage) assistant.usage = chunk.usage;
            return;
          }

          if (delta.reasoning_content) {
            streamedMessage.reasoning_content += delta.reasoning_content;
            assistant.reasoning += delta.reasoning_content;
          }
          if (delta.content) {
            streamedMessage.content += delta.content;
            assistant.content += delta.content;
          }

          for (const toolDelta of delta.tool_calls || []) {
            const index = toolDelta.index ?? 0;
            if (!streamedMessage.tool_calls[index]) {
              streamedMessage.tool_calls[index] = {
                id: "",
                type: "function",
                function: { name: "", arguments: "" }
              };
            }
            const target = streamedMessage.tool_calls[index];
            if (toolDelta.id) target.id = toolDelta.id;
            if (toolDelta.type) target.type = toolDelta.type;
            if (toolDelta.function?.name) target.function.name += toolDelta.function.name;
            if (toolDelta.function?.arguments) target.function.arguments += toolDelta.function.arguments;
          }

          if (chunk.usage) assistant.usage = chunk.usage;
          patchStreamingMessage(assistant);
        });

        streamedMessage.tool_calls = streamedMessage.tool_calls.filter(Boolean);
        if (!streamedMessage.content && !streamedMessage.reasoning_content &&
            !streamedMessage.tool_calls.length) {
          throw new Error("Agent 接口返回了空响应");
        }
        return streamedMessage;
      }

      async function readSSE(stream, onData) {
        const reader = stream.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
          const events = buffer.split(/\r?\n\r?\n/);
          buffer = events.pop() || "";

          for (const event of events) {
            const data = event
              .split(/\r?\n/)
              .filter((line) => line.startsWith("data:"))
              .map((line) => line.slice(5).trimStart())
              .join("\n");
            if (data) onData(data);
          }
          if (done) break;
        }
        if (buffer.trim()) {
          const data = buffer.replace(/^data:\s?/gm, "").trim();
          if (data) onData(data);
        }
      }

      function patchStreamingMessage(message) {
        const keepAtBottom = isNearMessageBottom();
        const article = els.messageList.querySelector(".message:last-child");
        if (!article) {
          renderMessages();
          if (keepAtBottom) scrollToBottom();
          return;
        }

        let details = article.querySelector(".reasoning");
        if (message.reasoning && !details) {
          renderMessages();
          if (keepAtBottom) scrollToBottom();
          return;
        }
        if (details) {
          details.open = !message.content;
          details.querySelector("summary").textContent = message.content ? "查看思考过程" : "正在思考…";
          details.querySelector(".reasoning-text").textContent = message.reasoning;
        }
        const body = article.querySelector(".message-body");
        body.innerHTML = message.content ? renderMarkdown(message.content) : "正在思考…";
        if (keepAtBottom) scrollToBottom();
      }

      function friendlyError(error) {
        const message = String(error?.message || error);
        if (/Failed to fetch|NetworkError|Load failed/i.test(message)) {
          return "无法连接 API。请检查网络、API 地址和浏览器 CORS 限制；公开部署建议使用后端代理。";
        }
        return message.length > 380 ? `${message.slice(0, 380)}…` : message;
      }

      function stopGeneration() {
        if (writeApprovalResolver) finishWriteApproval(false);
        controller?.abort();
      }

      function updateControls() {
        const hasInput = Boolean(els.prompt.value.trim() || pendingAttachments.length);
        els.sendBtn.disabled = generating ? false : !hasInput;
        els.sendBtn.classList.toggle("stop", generating);
        els.sendBtn.textContent = generating ? "■" : "↑";
        els.sendBtn.title = generating ? "停止生成" : "发送";
        els.modelSelect.disabled = generating;
        els.thinkingToggle.disabled = generating;
        els.agentToggle.disabled = generating;
        els.workspaceBtn.disabled = generating;
      }

      function updateConnectionStatus() {
        if (generating) return;
        const ready = Boolean(getApiKey());
        setStatus(ready ? "ready" : "", ready ? "已就绪" : "未配置");
        els.keyState.textContent = ready ? "已设置" : "未设置";
      }

      function setStatus(type, text) {
        els.status.className = `status ${type}`;
        els.statusText.textContent = text;
      }

      function resizePrompt() {
        els.prompt.style.height = "auto";
        els.prompt.style.height = `${Math.min(els.prompt.scrollHeight, 190)}px`;
      }

      function scrollToBottom() {
        requestAnimationFrame(() => {
          els.messages.scrollTop = els.messages.scrollHeight;
        });
      }

      function isNearMessageBottom(threshold = 140) {
        return els.messages.scrollHeight - els.messages.scrollTop - els.messages.clientHeight < threshold;
      }

      function canScrollElement(element, deltaY) {
        if (!element) return false;
        const style = getComputedStyle(element);
        const scrollable = /(auto|scroll)/.test(style.overflowY) &&
          element.scrollHeight > element.clientHeight;
        if (!scrollable) return false;
        return deltaY < 0 ? element.scrollTop > 0 :
          element.scrollTop + element.clientHeight < element.scrollHeight - 1;
      }

      function shouldKeepNativeWheel(target, deltaY) {
        let element = target instanceof Element ? target : null;
        while (element && element !== document.body) {
          if (element === els.messages) return false;
          if (canScrollElement(element, deltaY)) return true;
          element = element.parentElement;
        }
        return false;
      }

      function openSettings() {
        els.settingsDrawer.classList.add("open");
        els.drawerOverlay.classList.add("open");
      }

      function closeSettings() {
        els.settingsDrawer.classList.remove("open");
        els.drawerOverlay.classList.remove("open");
      }

      function openSidebar() {
        els.sidebar.classList.add("open");
        els.mobileOverlay.classList.add("open");
      }

      function closeSidebar() {
        els.sidebar.classList.remove("open");
        els.mobileOverlay.classList.remove("open");
      }

      function toast(message, type = "", duration = 2800) {
        const node = document.createElement("div");
        node.className = `toast ${type}`;
        node.textContent = message;
        els.toastStack.append(node);
        setTimeout(() => node.remove(), duration);
      }

      function setIconContent(element, iconUrl) {
        if (!element) return;
        element.innerHTML = "";
        if (iconUrl) {
          const image = document.createElement("img");
          image.className = "brand-icon-image";
          image.src = iconUrl;
          image.alt = "自定义图标";
          element.append(image);
        } else {
          element.textContent = "D";
        }
      }

      function applyBranding() {
        document.querySelectorAll(".logo, .welcome-mark").forEach((element) => {
          setIconContent(element, settings.customIcon);
        });
        setIconContent(els.iconPreview, settings.customIcon);

        let favicon = document.querySelector('link[rel="icon"]');
        if (!favicon) {
          favicon = document.createElement("link");
          favicon.rel = "icon";
          document.head.append(favicon);
        }
        favicon.href = settings.customIcon || defaultFavicon();
      }

      function defaultFavicon() {
        const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">' +
          '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">' +
