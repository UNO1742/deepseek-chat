          '<stop stop-color="#4e8cff"/><stop offset="1" stop-color="#7c5cff"/></linearGradient></defs>' +
          '<rect width="64" height="64" rx="18" fill="url(#g)"/>' +
          '<text x="32" y="43" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700" fill="white">D</text></svg>';
        return `data:image/svg+xml,${encodeURIComponent(svg)}`;
      }

      async function updateCustomIcon(file) {
        if (!file) return;
        const allowed = ["image/png", "image/jpeg", "image/webp", "image/svg+xml"];
        if (!allowed.includes(file.type)) {
          toast("请选择 PNG、JPG、WebP 或 SVG 图片", "error");
          return;
        }
        if (file.size > 5 * 1024 * 1024) {
          toast("图标文件不能超过 5 MB", "error");
          return;
        }

        try {
          settings.customIcon = await resizeIcon(file);
          saveSettings();
          applyBranding();
          toast("自定义图标已应用");
        } catch {
          toast("无法读取此图片，请尝试其他文件", "error");
        } finally {
          els.iconInput.value = "";
        }
      }

      function resizeIcon(file) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          const objectUrl = URL.createObjectURL(file);
          image.onload = () => {
            const canvas = document.createElement("canvas");
            const size = 256;
            canvas.width = size;
            canvas.height = size;
            const context = canvas.getContext("2d");
            context.clearRect(0, 0, size, size);
            const scale = Math.min(size / image.naturalWidth, size / image.naturalHeight);
            const width = image.naturalWidth * scale;
            const height = image.naturalHeight * scale;
            context.drawImage(image, (size - width) / 2, (size - height) / 2, width, height);
            URL.revokeObjectURL(objectUrl);
            resolve(canvas.toDataURL("image/png"));
          };
          image.onerror = () => {
            URL.revokeObjectURL(objectUrl);
            reject(new Error("invalid image"));
          };
          image.src = objectUrl;
        });
      }

      function syncSettingsUI() {
        const knownModels = [...els.modelSelect.options].map((option) => option.value);
        els.modelSelect.value = knownModels.includes(settings.model) ? settings.model : "custom";
        els.customModel.value = settings.customModel;
        els.thinkingToggle.classList.toggle("active", settings.thinking);
        els.reasoningEffort.value = settings.reasoningEffort;
        els.temperature.value = settings.temperature;
        els.temperatureValue.textContent = Number(settings.temperature).toFixed(1);
        els.maxTokens.value = settings.maxTokens;
        els.responseFormat.value = settings.responseFormat;
        els.systemPrompt.value = settings.systemPrompt;
        els.baseUrl.value = settings.baseUrl;
        applyBranding();
        updateAgentUI();

        const localKey = localStorage.getItem(API_KEY_LOCAL);
        const sessionKey = sessionStorage.getItem(API_KEY_SESSION);
        els.apiKey.value = localKey || sessionKey || "";
        els.rememberKey.checked = Boolean(localKey);
        updateConnectionStatus();
      }

      function exportData() {
        const data = {
          version: 2,
          exportedAt: new Date().toISOString(),
          conversations: state.conversations,
          settings: { ...settings }
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `deepseek-chat-${new Date().toISOString().slice(0, 10)}.json`;
        link.click();
        URL.revokeObjectURL(link.href);
      }

      async function importData(file) {
        try {
          const data = JSON.parse(await file.text());
          if (!Array.isArray(data.conversations)) throw new Error("文件中没有有效的 conversations 数据");
          const imported = data.conversations.filter((conversation) =>
            conversation && Array.isArray(conversation.messages)
          );
          state.conversations = [...imported, ...state.conversations];
          state.activeId = imported[0]?.id || state.activeId;
          saveState();
          renderAll();
          toast(`已导入 ${imported.length} 个对话`);
        } catch (error) {
          toast(`导入失败：${error.message}`, "error");
        } finally {
          els.importFile.value = "";
        }
      }

      els.newChatBtn.addEventListener("click", () => {
        if (generating) stopGeneration();
        pendingAttachments = [];
        renderPendingAttachments();
        createConversation();
      });
      els.historySearch.addEventListener("input", renderHistory);
      els.menuBtn.addEventListener("click", openSidebar);
      els.mobileOverlay.addEventListener("click", closeSidebar);
      els.settingsBtn.addEventListener("click", openSettings);
      els.closeSettingsBtn.addEventListener("click", closeSettings);
      els.drawerOverlay.addEventListener("click", closeSettings);
      els.chooseIconBtn.addEventListener("click", () => els.iconInput.click());
      els.iconInput.addEventListener("change", () => updateCustomIcon(els.iconInput.files[0]));
      els.resetIconBtn.addEventListener("click", () => {
        settings.customIcon = "";
        saveSettings();
        applyBranding();
        toast("已恢复默认图标");
      });

      els.prompt.addEventListener("input", () => {
        resizePrompt();
        updateControls();
      });
      document.querySelector(".main").addEventListener("wheel", (event) => {
        if (els.approvalModal.classList.contains("open") ||
            els.settingsDrawer.classList.contains("open") ||
            shouldKeepNativeWheel(event.target, event.deltaY)) {
          return;
        }
        if (els.messages.scrollHeight > els.messages.clientHeight) {
          event.preventDefault();
          els.messages.scrollTop += event.deltaY;
        }
      }, { passive: false });
      els.prompt.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey && !event.isComposing) {
          event.preventDefault();
          sendMessage();
        }
      });
      els.sendBtn.addEventListener("click", () => generating ? stopGeneration() : sendMessage());
      els.uploadBtn.addEventListener("click", () => els.fileInput.click());
      els.fileInput.addEventListener("change", () => addFiles(els.fileInput.files));

      ["dragenter", "dragover"].forEach((eventName) => {
        els.composer.addEventListener(eventName, (event) => {
          event.preventDefault();
          if (!generating) els.composer.classList.add("dragging");
        });
      });
      ["dragleave", "drop"].forEach((eventName) => {
        els.composer.addEventListener(eventName, (event) => {
          event.preventDefault();
          els.composer.classList.remove("dragging");
        });
      });
      els.composer.addEventListener("drop", (event) => {
        if (!generating && event.dataTransfer?.files?.length) {
          addFiles(event.dataTransfer.files);
        }
      });

      els.modelSelect.addEventListener("change", () => {
        settings.model = els.modelSelect.value;
        saveSettings();
        if (settings.model === "custom") {
          openSettings();
          els.customModel.focus();
        }
      });
      els.thinkingToggle.addEventListener("click", () => {
        if (generating) return;
        settings.thinking = !settings.thinking;
        els.thinkingToggle.classList.toggle("active", settings.thinking);
        saveSettings();
        toast(settings.thinking ? "已开启深度思考" : "已关闭深度思考");
      });
      els.agentToggle.addEventListener("click", async () => {
        if (generating) return;
        if (!settings.agentMode && !workspaceHandle) {
          await chooseWorkspace();
          return;
        }
        settings.agentMode = !settings.agentMode;
        saveSettings();
        updateAgentUI();
        toast(settings.agentMode ? "Agent 模式已开启" : "Agent 模式已关闭");
      });
      els.workspaceBtn.addEventListener("click", () => {
        if (!generating) chooseWorkspace();
      });
      els.rejectWriteBtn.addEventListener("click", () => finishWriteApproval(false));
      els.approveWriteBtn.addEventListener("click", () => finishWriteApproval(true));

      els.apiKey.addEventListener("change", storeApiKey);
      els.apiKey.addEventListener("blur", storeApiKey);
      els.rememberKey.addEventListener("change", storeApiKey);
      els.showKeyBtn.addEventListener("click", () => {
        const showing = els.apiKey.type === "text";
        els.apiKey.type = showing ? "password" : "text";
        els.showKeyBtn.textContent = showing ? "显示" : "隐藏";
      });
      els.baseUrl.addEventListener("change", () => {
        settings.baseUrl = els.baseUrl.value.trim() || defaultSettings.baseUrl;
        els.baseUrl.value = settings.baseUrl;
        saveSettings();
      });
      els.customModel.addEventListener("input", () => {
        settings.customModel = els.customModel.value.trim();
        saveSettings();
      });
      els.reasoningEffort.addEventListener("change", () => {
        settings.reasoningEffort = els.reasoningEffort.value;
        saveSettings();
      });
      els.temperature.addEventListener("input", () => {
        settings.temperature = Number(els.temperature.value);
        els.temperatureValue.textContent = settings.temperature.toFixed(1);
        saveSettings();
      });
      els.maxTokens.addEventListener("change", () => {
        settings.maxTokens = Math.max(1, Number(els.maxTokens.value) || 8192);
        els.maxTokens.value = settings.maxTokens;
        saveSettings();
      });
      els.responseFormat.addEventListener("change", () => {
        settings.responseFormat = els.responseFormat.value;
        saveSettings();
      });
      els.systemPrompt.addEventListener("change", () => {
        settings.systemPrompt = els.systemPrompt.value;
        saveSettings();
      });

      els.exportBtn.addEventListener("click", exportData);
      els.importBtn.addEventListener("click", () => els.importFile.click());
      els.importFile.addEventListener("change", () => {
        if (els.importFile.files[0]) importData(els.importFile.files[0]);
      });
      els.clearAllBtn.addEventListener("click", () => {
        if (!confirm("确定清空全部本地对话吗？此操作无法撤销。")) return;
        if (generating) stopGeneration();
        state = { conversations: [], activeId: null };
        saveState();
        renderAll();
        toast("已清空全部对话");
      });

      els.messageList.addEventListener("click", async (event) => {
        const button = event.target.closest(".copy-code");
        if (!button) return;
        const code = button.closest(".code-block").querySelector("code").textContent;
        await navigator.clipboard.writeText(code);
        button.textContent = "已复制";
        setTimeout(() => { button.textContent = "复制代码"; }, 1200);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeSettings();
          closeSidebar();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
          event.preventDefault();
          els.historySearch.focus();
          openSidebar();
        }
      });

      syncSettingsUI();
      renderAll();
      renderPendingAttachments();
      resizePrompt();
      els.prompt.focus();
    })();
  </script>
</body>
</html>
